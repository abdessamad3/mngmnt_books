<div class="search-container mb-3">
  <div class="input-group">

    <input #searchInput
           type="text"
           class="form-control"
           placeholder="Search by title, Isbn... (Press Enter to search)"
           [(ngModel)]="searchTerm"
           (keyup.enter)="onEnterPressed()">

    <button class="btn btn-primary"
            type="button"
            (click)="onEnterPressed()">
      Search
    </button>
  </div>
  <small class="text-muted mt-1 d-block">
    <i class="bi bi-info-circle"></i> Type and press Enter to search
  </small>
</div>
