<div class="container mt-4">
  <!-- HEADER ROW: Title on LEFT, Add Button on RIGHT -->
  <div class="row mb-4 align-items-center">
    <div class="col-6">
      <!-- Changed from col-xs-6 to col-6 -->
      <h2 class="mb-0">Book Management</h2>
    </div>
    <div class="col-6 text-end">
      <!-- Changed from text-right to text-end -->
      <button class="btn btn-success" (click)="openAddModal()">
        <i class="bi bi-plus-circle"></i> Add New Book
      </button>
    </div>
  </div>
</div>

<button
  mat-flat-button
  class="btn btn-success"
  style="display: none"
  (click)="AddBookDialog()"
>
  Add Book
</button>

<!-- Search Component - Only triggers on Enter -->
  <app-search-bar
    (search)="onSearch($event)"
    [initialValue]="lastSearchTerm">
  </app-search-bar>

  <!-- Results summary (optional) -->
  <div *ngIf="lastSearchTerm && !isloading" class="mb-2">
    <span class="badge bg-info">
      Searching for: "{{lastSearchTerm}}"
    </span>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="isloading" class="text-center my-6">
    <div class="spinner-border text-primary"></div>
  </div>

<!-- *ngIf="!isloading && books.length >= 1"-->
<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <!-- Title/Name Column - Sortable -->
    <th (click)="onSort('name')"
        style="cursor: pointer;"
        [class.table-primary]="isSorted('name')">
      <div class="d-flex align-items-center">
        Title
        <i class="bi ms-2" [class]="getSortIcon('name')"></i>
        <!--<small *ngIf="isSorted('name')" class="text-muted">
        {{ activeSort.order === 'asc' ? '(A → Z)' : '(Z → A)' }}
      </small> -->
      </div>
    </th>

      <!-- Title/Name Column - Sortable -->
    <th (click)="onSort('isbm')"
        style="cursor: pointer;"
        [class.table-primary]="isSorted('isbm')">
      <div class="d-flex align-items-center">
        ISBN
        <i class="bi ms-2" [class]="getSortIcon('isbm')"></i>
        <!--<small *ngIf="isSorted('name')" class="text-muted">
        {{ activeSort.order === 'asc' ? '(A → Z)' : '(Z → A)' }}
      </small> -->
      </div>
    </th>
    <th (click)="onSort('price')"
        style="cursor: pointer;"
        [class.table-primary]="isSorted('price')">
      <div class="d-flex align-items-center">
        Price
        <i class="bi ms-2" [class]="getSortIcon('price')"></i>
        <!--<small *ngIf="isSorted('name')" class="text-muted">
        {{ activeSort.order === 'asc' ? '(A → Z)' : '(Z → A)' }}
      </small> -->
      </div>
    </th>
    <th (click)="onSort('publishedAt')"
        style="cursor: pointer;"
        [class.table-primary]="isSorted('publishedAt')">
      <div class="d-flex align-items-center">
        published At
        <i class="bi ms-2" [class]="getSortIcon('publishedAt')"></i>
        <!--<small *ngIf="isSorted('name')" class="text-muted">
        {{ activeSort.order === 'asc' ? '(A → Z)' : '(Z → A)' }}
      </small> -->
      </div>
    </th>
      <th>Pages</th>
      <th>Language</th>
      <th>actions</th>
    </tr>
  </thead>
  <tbody>
    <!--<tr *ngIf="isloading && !error">
      <td colspan="8">
        <div class="d-flex justify-content-center py-4">
          <div class="spinner-border text-primary me-3" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <span class="text-muted">Loading ...</span>
        </div>
      </td>
    </tr>-->
    <tr *ngIf="books.length < 1 && !isloading && !error">
       <td colspan="8">
        <div class="d-flex justify-content-center py-4">
          no data available
        </div>
      </td>


</tr>
    <tr *ngFor="let book of books">
      <td>{{ book.id }}</td>
      <td>{{ book.name }}</td>
      <td>{{ book.isbm }}</td>
      <td>{{ book.price }}</td>
      <td>{{ book.publishedAt | date:'dd/MM/yyyy' }}</td>
      <td>{{ book.pages }}</td>
      <td>{{ book.language }}</td>
      <td>
        <button
          type="button"
          class="btn btn-light"
          matButton="elevated"
          (click)="openEditModal(book)"
        >
          edit
        </button>
        |
        <button
          type="button"
          class="btn btn-danger"
          matButton="elevated"
          (click)="openDeleteModal(book)"
        >
          Delete
        </button>
        <!--
        <button
          type="button"
          class="btn btn-light"
          matButton="elevated"
          (click)="onEditDialog(book)"
        >
          edit
        </button>
        -->

        <!--
        <button
          type="button"
          class="btn btn-danger"
          matButton="elevated"
          (click)="onDeleteDialog(book.id, book.name)"
        >
          Delete
        </button>
      -->
      </td>
    </tr>
  </tbody>
</table>

<app-pagination
        [currentPage]="currentPage"
        [totalItems]="totalItems"
        [itemsPerPage]="itemsPerPage"
        (pageChange)="onPageChange($event)">
</app-pagination>
