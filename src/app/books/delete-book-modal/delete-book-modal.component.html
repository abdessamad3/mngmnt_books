 <div class="modal-header">
      <h4 class="modal-title">
        <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>
        Confirm Delete
      </h4>
      <button type="button" class="btn-close" aria-label="Close" (click)="dismiss()"></button>
    </div>

    <div class="modal-body">
      <p class="fs-5">Are you sure you want to delete this book?</p>

      <div class="card bg-light mt-3">
        <div class="card-body">
          <h5 class="card-title"> <strong>Title</strong> {{ bookData?.name}}</h5>
          <p class="card-text mb-1"><strong>ISBN:</strong> {{ bookData?.isbm }}</p>
          <p class="card-text mb-1"><strong>pages:</strong> {{ bookData?.pages }}</p>
          <p class="card-text mb-0"><strong>Language:</strong> {{ bookData?.language }}</p>
        </div>
      </div>

      <p class="text-danger mt-3 mb-0">
        <i class="bi bi-info-circle"></i>
        This action cannot be undone.
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-outline-secondary" (click)="dismiss()">
        <i class="bi bi-x-lg"></i> Cancel
      </button>
      <button type="button" class="btn btn-danger" (click)="confirmDelete()">
        <i class="bi bi-trash3"></i> Delete Permanently
      </button>
    </div>
